<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROVEN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#0b0b0d;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:30px 80px;
}

.logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:8px;
}

nav a{
    color:#aaa;
    text-decoration:none;
    margin-left:35px;
    transition:.3s;
}

nav a:hover{
    color:white;
}

.hero{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:90px;
    letter-spacing:12px;
    margin-bottom:20px;
}

.hero p{
    color:#999;
    font-size:18px;
    max-width:650px;
    margin:auto;
    line-height:1.8;
}

.button{
    display:inline-block;
    margin-top:45px;
    padding:15px 38px;
    border:1px solid white;
    color:white;
    text-decoration:none;
    border-radius:50px;
    transition:.3s;
}

.button:hover{
    background:white;
    color:black;
}

footer{
    text-align:center;
    color:#666;
    padding:35px;
    border-top:1px solid #1d1d1d;
}

.blur{
    position:fixed;
    width:500px;
    height:500px;
    background:#355cff;
    filter:blur(220px);
    opacity:.18;
    top:-150px;
    right:-100px;
    z-index:-1;
}
</style>

</head>
<body>

<div class="blur"></div>

<header>
    <div class="logo">ROVEN</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Technology</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">

<div>

<h1>ROVEN</h1>

<p>
Modern digital solutions built with precision, simplicity and innovation.
A concept project focused on creating reliable and elegant web experiences.
</p>

<a class="button" href="#">
Explore
</a>

</div>

</section>

<footer>
© 2026 ROVEN. All rights reserved.
</footer>

</body>
</html>
